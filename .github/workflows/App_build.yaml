name: App Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Speed Tip: If you have a paid GitHub plan, use 'ubuntu-latest-4-core' 
    # for significantly faster compilation.
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Optimization: Prevents the cache from being overwritten on PRs
          # while still allowing the build to use existing cache.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
         # generate-job-summary: false # Tiny overhead reduction
          add-job-summary: 'on'
          cache-overwrite-existing: false
          generate-job-summary: true
          
      - name: Make gradlew executable
        run: chmod +x gradlew 
        
      # ADB check
      - name: Check ADB and Environment
        run: |
          adb version
          java -version
          
      # Lint Analysis (Debug & Release)
      
      #./gradlew lintDebug lintRelease \
      - name: Run Lint Analysis
        run: |
          ./gradlew lintDebug \
            --parallel \
            --build-cache \
            --configuration-cache \
            --stacktrace

      - name: Build and Test & Run Lint
        env:
          # Speed Tip: Increase JVM heap and use the parallel GC
          
           #-Pkotlin.incremental=true \
            #  -Pandroid.injected.abi.only=arm64-v8a \
            #./gradlew assembleDebug assembleRelease bundleRelease \
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC -Dfile.encoding=UTF-8"
        run: |
          ./gradlew lintDebug assembleDebug \
            --parallel \
            --build-cache \
            --configuration-cache \
            --configure-on-demand \
            -Dorg.gradle.workers.max=4 \
            -Dorg.gradle.vfs.watch=true \
            -Dkotlin.incremental=true \
            -Pandroid.testInstrumentationRunnerArguments.notAnnotation=androidx.test.filters.LargeTest \
            --no-daemon
            
      # Lint results
      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            app/build/reports/lint-results-*
            app/build/test-results/testDebugUnitTest/
           # app/build/test-results/testReleaseUnitTest/

      - name: Upload APK
        if: github.event_name == 'push' # Only upload on merge to save time on PRs
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          compression-level: 0 # No compression = faster upload if the APK is small

      #. Upload Debug APK Artifact
    #  - name: Upload Debug APK
    #    if: github.event_name == 'push'
    #    uses: actions/upload-artifact@v4
    #    with:
    #      name: app-debug-apk
    #      path: app/build/outputs/apk/debug/*.apk
